services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: genius
      POSTGRES_PASSWORD: genius
      POSTGRES_DB: genius
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genius -d genius"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://genius:genius@postgres:5432/genius
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html/game:ro
    depends_on:
      - backend

volumes:
  pgdata:
