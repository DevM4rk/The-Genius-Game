# infra/docker-compose.yml
# 로컬에서 "실제 배포와 똑같은 구조"를 그대로 재현하는 파일.
# 나중에 AWS(EC2 등)에 올릴 때도 이 파일 + 이미지를 그대로 가져가면 됨.
#
# 구성:
#   backend  - FastAPI + WebSocket (백엔드 로직, 외부에는 직접 노출 안 함)
#   nginx    - 브라우저가 실제로 접속하는 창구. 정적 파일(Godot Web) + /api, /ws 프록시

services:
  backend:
    build:
      context: ../backend
    restart: unless-stopped
    expose:
      - "8000" # 컨테이너 네트워크 내부에서만 열림 (nginx가 backend:8000으로 접근)
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80" # 로컬 테스트용 포트. 실서버에서는 80/443 + 도메인/인증서로 교체
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/gomoku/export/web:/usr/share/nginx/html:ro
    depends_on:
      - backend
