# infra/docker-compose.yml
# 로컬: HTTP :8080 (localhost Secure Context)
# EC2: docker-compose.prod.yml 함께 사용 (HTTPS :443)

services:
  backend:
    build:
      context: ../backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/gomoku/export/web:/usr/share/nginx/html:ro
    depends_on:
      - backend
