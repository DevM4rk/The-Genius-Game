server {
    listen 80;
    server_name localhost;

    # Godot HTML5 + SharedArrayBuffer require cross-origin isolation.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Temporary landing until Godot web export is published under /game/.
    location = / {
        return 302 /api/health;
    }

    location /game/ {
        alias /usr/share/nginx/html/game/;
        try_files $uri $uri/ /game/index.html;
        # Exported .wasm / .pck need CORP for COEP pages.
        location ~* \.(wasm|pck|js|html)$ {
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Deep link for private rooms — Godot client reads path client-side.
    location ~ ^/play/[a-z0-9]+$ {
        # Serve game shell; Godot parses URL for room code.
        rewrite ^ /game/ last;
    }
}
