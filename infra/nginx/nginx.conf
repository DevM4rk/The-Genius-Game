# infra/nginx/nginx.conf
# 역할 3가지:
#   1) 정적 파일 서빙 — Godot Web Export 결과물(index.html, .wasm, .pck, .js)
#   2) 리버스 프록시 — /api, /health, /ws 요청을 backend 컨테이너로 전달
#   3) COOP/COEP 헤더 — Godot 4 Web Export가 SharedArrayBuffer(스레드)를 쓰려면 필수.
#      이 헤더가 없으면 브라우저가 보안상 차단해서 게임이 아예 로드되지 않음.

# WebSocket 업그레이드 시 Connection 헤더를 그대로 넘기기 위한 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 모든 응답에 COOP/COEP 적용 (정적 파일 + 아래 API 응답 포함)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # 1) 정적 파일 (Godot Web Export 결과물)
    location / {
        try_files $uri $uri/ =404;
    }

    # .wasm은 nginx 기본 mime.types에 없을 수 있어 명시적으로 지정
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 2) REST API 프록시 — /api/rooms 등
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # 3) WebSocket 프록시 — /ws/{room_id}, /ws/quick
    #    proxy_http_version 1.1 + Upgrade/Connection 헤더가 있어야 WS 핸드셰이크가 통과됨
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s; # 게임 중 유휴 시간이 길어도 연결이 끊기지 않도록
    }
}
